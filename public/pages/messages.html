        <section class="messages-section">
          <div class="section-heading">
            <div>
              <h2 id="messagesPageTitle">聊天</h2>
              <small id="messagesSummary">和论坛里的同学、校友或 recruiter 继续私聊。</small>
            </div>
          </div>
          <div class="messages-layout">
            <aside class="message-thread-list" id="messageThreadList" aria-label="私信列表"></aside>
            <section class="message-conversation" aria-live="polite">
              <div id="messageConversationHeader" class="message-conversation-header"></div>
              <div id="messageConversationBody" class="message-conversation-body"></div>
              <form id="messageComposerForm" class="message-composer">
                <input id="messageComposerInput" type="text" autocomplete="off" placeholder="写一条消息">
                <button class="icon-button accent" type="submit" title="发送" aria-label="发送">
                  <i data-lucide="send"></i>
                </button>
              </form>
            </section>
          </div>
        </section>
