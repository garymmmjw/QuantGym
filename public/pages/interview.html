      <section class="interview-section">
        <div class="section-heading">
          <div>
            <h2>模拟面试</h2>
            <small id="interviewSummary">配置题型、题数、主题范围和题目来源。</small>
          </div>
        </div>
        <div id="interviewGrid" class="interview-grid setup-only">
          <div class="interview-setup-shark" id="interviewSetupShark" aria-hidden="true">
            <img src="assets/generated/shark-hero-clean.png?v=original-clean-1" alt="" loading="lazy" draggable="false">
          </div>
          <div id="interviewSetup" class="interview-setup">
            <div class="interview-setup-top">
              <div>
                <strong>开始一场模拟面试</strong>
                <small>先选好语言、模型和模式，进入后由 AI 面试官用对话完成方向、难度、题量、风格等设置。</small>
              </div>
            </div>
            <div class="interview-setup-choices">
              <div class="interview-setup-field">
                <span class="interview-setup-label">语言</span>
                <div class="segmented interview-language-toggle" aria-label="面试语言">
                  <button class="segment active" type="button" data-interview-lang="zh">中文</button>
                  <button class="segment" type="button" data-interview-lang="en">English</button>
                </div>
              </div>
              <div class="interview-setup-field">
                <span class="interview-setup-label">模式</span>
                <div class="segmented interview-mode-toggle" aria-label="面试模式">
                  <button class="segment active" type="button" data-interview-mode="practice">训练练习</button>
                  <button class="segment" type="button" data-interview-mode="live">真实面试</button>
                </div>
              </div>
              <div class="interview-setup-field">
                <span class="interview-setup-label">模型</span>
                <select id="llmModelInput" aria-label="LLM Model">
                  <option value="gpt-5-nano" selected>gpt-5-nano · 最便宜</option>
                  <option value="gpt-5-mini">gpt-5-mini · 更稳</option>
                  <option value="gpt-5">gpt-5 · 更强</option>
                  <option value="gpt-5.4-mini">gpt-5.4-mini · 新 mini</option>
                  <option value="gpt-5.4">gpt-5.4 · 高质量</option>
                  <option value="gpt-4o-mini">gpt-4o-mini · 旧版低价</option>
                  <option value="gpt-4.1-nano">gpt-4.1-nano · 旧版 nano</option>
                </select>
              </div>
            </div>
            <details class="interview-advanced-config">
              <summary>高级设置</summary>
              <div class="interview-advanced-grid">
                <label>
                  面试类型
                  <select id="interviewTypeSelect" aria-label="面试类型">
                    <option value="oa">Online Assessment</option>
                    <option value="technical">Technical Interview</option>
                    <option value="behavioral">Behavioral Interview</option>
                  </select>
                </label>
                <label>
                  问题数量
                  <input id="interviewQuestionCount" type="number" min="1" max="12" value="3">
                </label>
                <label>
                  每题时间（分钟）
                  <input id="interviewQuestionTime" type="number" min="1" max="60" value="5">
                </label>
                <label class="hidden" aria-hidden="true">
                  作答方式
                  <select id="interviewAnswerModeSelect" aria-label="作答方式">
                    <option value="text">文字作答</option>
                    <option value="file">文件上传</option>
                    <option value="voice">语音作答</option>
                  </select>
                </label>
                <label>
                  题目来源
                  <select id="interviewSourceSelect" aria-label="题目来源">
                    <option value="full">全范围题库</option>
                    <option value="pdf">上传 PDF 生成题目</option>
                  </select>
                </label>
                <label id="interviewPdfRow" class="interview-pdf-row hidden">
                  PDF 文件
                  <input id="interviewPdfInput" type="file" accept="application/pdf">
                  <small id="interviewPdfMeta">上传 PDF 后会由 LLM 总结重点并生成题目。</small>
                </label>
                <div id="interviewCategoryRow" class="interview-category-row">
                  <span>主题范围</span>
                  <div id="interviewCategoryPicker" class="interview-category-picker" aria-label="主题范围"></div>
                </div>
                <input id="llmEndpointInput" type="url" value="http://127.0.0.1:8787/interview" placeholder="http://127.0.0.1:8787/interview">
              </div>
            </details>
            <button class="primary-button" id="startInterviewBtn" type="button">
              <i data-lucide="messages-square"></i>
              进入模拟面试
            </button>
            <button class="secondary-button hidden" id="resumeInterviewBtn" type="button">
              <i data-lucide="rotate-ccw"></i>
              继续上次面试
            </button>
          </div>
          <div id="interviewConsole" class="interview-console hidden">
            <div class="interview-console-head">
              <div class="interview-console-head-main">
                <button class="interview-exit-btn" id="exitInterviewBtn" type="button" title="退出模拟面试" aria-label="退出模拟面试">
                  <i data-lucide="log-out"></i>
                  退出
                </button>
                <div>
                  <strong id="interviewSessionTitle">Ready</strong>
                  <small id="interviewQuestionStatus">还没有开始。</small>
                </div>
              </div>
              <div class="interview-console-head-actions">
                <button class="icon-button ghost interview-panel-toggle hidden" id="toggleInterviewPanelBtn" type="button" title="进度面板" aria-label="进度面板" aria-pressed="false">
                  <i data-lucide="panel-right"></i>
                </button>
                <div id="interviewTimer" class="interview-timer">--:--</div>
              </div>
            </div>
            <div class="interview-workspace">
              <div id="interviewTranscript" class="interview-transcript"></div>
              <aside id="interviewQuestionPanel" class="interview-question-panel" aria-label="本轮面试题目"></aside>
            </div>
            <form id="interviewForm" class="interview-form">
              <div class="interview-chat-input">
                <label id="interviewAnswerFileRow" class="interview-attach-plus" title="上传图片或文件" aria-label="上传图片或文件">
                  <input id="interviewAnswerFile" type="file" accept=".txt,.md,.tex,.pdf,text/*,application/pdf,image/*">
                  <i data-lucide="plus"></i>
                  <span id="interviewAnswerFileMeta" class="sr-only">支持图片、文本文件和 PDF。</span>
                </label>
                <textarea id="interviewAnswer" rows="1" placeholder="输入你的回答"></textarea>
                <div id="interviewAttachmentPreview" class="interview-attachment-preview hidden"></div>
                <div class="interview-chat-actions">
                  <button class="icon-button ghost" id="voiceAnswerBtn" type="button" title="语音作答" aria-label="语音作答">
                    <i data-lucide="mic"></i>
                  </button>
                  <button class="icon-button ghost" id="hintInterviewBtn" type="button" title="Hint" aria-label="Hint">
                    <i data-lucide="lightbulb"></i>
                  </button>
                  <button class="icon-button ghost" id="revealAnswerBtn" type="button" title="显示参考答案" aria-label="显示参考答案">
                    <i data-lucide="book-open"></i>
                  </button>
                  <button class="icon-button accent interview-send-button" type="submit" title="提交回答" aria-label="提交回答">
                    <i data-lucide="send"></i>
                  </button>
                </div>
              </div>
            </form>
            <div id="interviewCompleteActions" class="interview-complete-actions hidden">
              <button class="primary-button" id="nextInterviewQuestionBtn" type="button">
                <i data-lucide="skip-forward"></i>
                下一题
              </button>
              <button class="secondary-button" id="saveInterviewFavoriteBtn" type="button">
                <i data-lucide="bookmark-plus"></i>
                总结到收藏夹
              </button>
              <button class="secondary-button" id="shareInterviewQuestionBtn" type="button">
                <i data-lucide="copy"></i>
                分享
              </button>
              <button class="primary-button hidden" id="restartInterviewBtn" type="button">
                <i data-lucide="rotate-ccw"></i>
                再来一场
              </button>
              <button class="secondary-button hidden" id="exportInterviewReportBtn" type="button">
                <i data-lucide="file-down"></i>
                导出 PDF
              </button>
            </div>
            <div class="interview-favorites">
              <div class="interview-favorites-head">
                <strong>收藏夹</strong>
                <small id="interviewFavoritesSummary">保存高价值题目复盘。</small>
              </div>
              <div id="interviewFavoritesList" class="interview-favorites-list"></div>
            </div>
          </div>
        </div>
      </section>
