    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <script>
      (() => {
        try {
          const auth = JSON.parse(localStorage.getItem("quantMemoryBoard.auth.v1") || "null");
          const accounts = Array.isArray(auth?.accounts) ? auth.accounts : [];
          const current = accounts.find((account) => account?.id && account.id === auth?.currentUserId);
          const lastSeen = Date.parse(auth?.lastAuthenticatedAt || current?.updatedAt || current?.createdAt || "");
          const recentWindow = 30 * 24 * 60 * 60 * 1000;
          if (current && (!Number.isFinite(lastSeen) || Date.now() - lastSeen < recentWindow)) {
            document.documentElement.classList.add("auth-session-hint");
          }
        } catch {}
      })();
    </script>
    <link rel="stylesheet" href="styles.css?direct&v=49">
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["$", "$"], ["\\(", "\\)"]],
          displayMath: [["\\[", "\\]"], ["$$", "$$"]],
          macros: {
            E: "\\mathbb{E}",
            Prob: "\\mathbb{P}",
            Var: "\\mathrm{Var}",
            Cov: "\\mathrm{Cov}",
            Unif: "\\operatorname{Unif}",
            Bin: "\\operatorname{Bin}",
            dd: "\\mathrm{d}",
            R: "\\mathbb{R}",
            N: "\\mathbb{N}"
          }
        }
      };
    </script>
